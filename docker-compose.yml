# Infraestructura compartida de desarrollo/test (ADR-0002, ADR-0004).
# Efímera a propósito: sin volúmenes persistentes, credenciales por defecto
# SOLO para localhost. Producción se define en fase 05-deployment.
#
#   docker compose up -d --wait
#   docker compose down

name: ves-market-watch

services:
  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"
      - "15672:15672" # UI de gestión: http://localhost:15672 (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ves_market
    ports:
      # 5433 en el host: el 5432 suele estar ocupado por un PostgreSQL local/WSL.
      - "5433:5432"
    volumes:
      # La DB de desarrollo nace con el esquema del ingestor aplicado.
      # Archivo individual (no el directorio): montar el directorio completo
      # aplastaría el init propio de la imagen (000_install_timescaledb.sh),
      # que instala la extensión en template1.
      - ./apps/ingestor-bcv/db/migrations/001_official_rates.sql:/docker-entrypoint-initdb.d/900_official_rates.sql:ro
      - ./apps/ingestor-bcv/db/migrations/002_suspect_resolution.sql:/docker-entrypoint-initdb.d/901_suspect_resolution.sql:ro
      - ./apps/indicator-engine/db/migrations/001_indicators.sql:/docker-entrypoint-initdb.d/902_indicators.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ves_market"]
      interval: 5s
      timeout: 5s
      retries: 12
